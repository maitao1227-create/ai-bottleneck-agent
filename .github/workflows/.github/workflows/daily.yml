name: 每日AI瓶颈选股

on:
  schedule:
    - cron: "0 1 * * *"  # 每天UTC 1点（北京时间上午9点）
  workflow_dispatch:  # 允许手动运行

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip

      - name: 运行AI脚本
        run: |
          python main.py
